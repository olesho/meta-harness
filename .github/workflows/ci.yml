name: ci
on:
  push:
  pull_request:

jobs:
  veracity-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Go is always required to install the pinned veracity binary itself.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # pnpm version comes from package.json "packageManager"; passing it here
      # too makes pnpm/action-setup error ("Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned veracity
        run: go install github.com/olesho/veracity/cmd/veracity@$(cat .veracity-version)
      - name: Install dependencies
        run: veracity bootstrap
      - name: Install pinned analyzers
        run: veracity install-tools
      - name: veracity ci
        run: veracity ci
